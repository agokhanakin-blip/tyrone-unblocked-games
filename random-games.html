<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Random Games – Tyrone Unblocked Games</title>
<meta name="description" content="Discover random browser games from Tyrone Unblocked Games collection.">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>Tyrone Unblocked Games</h1>

<nav>
<a href="index.html">Home</a>
<a href="new-games.html">New Games</a>
<a href="popular-games.html">Popular Games</a>
<a href="liked-games.html">Most Liked</a>
<a href="trending-games.html">Trending Games</a>
<a href="most-played-week.html">Most Played Week</a>
<a href="random-games.html">Random Games</a>
<a href="categories.html">Categories</a>
</nav>

</header>

<section class="game-section">
<h2>Random Games</h2>
<div id="games" class="game-grid"></div>
</section>

<script>

async function loadGames(){

const res = await fetch("https://tyroneunblockedgames.com/generate_github_games_json.php?type=random");
const games = await res.json();

let html = "";

games.forEach(game=>{
html += `
<a class="game-card" href="${game.link}" target="_blank">
<img src="${game.thumb}" alt="${game.name}">
<span>${game.name}</span>
</a>
`;
});

document.getElementById("games").innerHTML = html;

}

loadGames();

</script>

</body>
</html>
