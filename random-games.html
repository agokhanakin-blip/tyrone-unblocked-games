<body>

<header>

<nav>

</nav>

</header>


<section class="game-section">

<h2>Random Games</h2>

<div id="games" class="game-grid"></div>

</section>


<script>

async function loadGames(){

const response = await fetch("https://tyroneunblockedgames.com/generate_github_games_json.php?type=random");

const games = await response.json();

let html = "";

games.forEach(game => {

html += `

<a class="game-card" href="${game.link}" target="_blank">

<img src="${game.thumb}" alt="${game.name}">

<span>${game.name}</span>

</a>

`;

});

document.getElementById("games").innerHTML = html;

}

loadGames();

</script>


</body>
