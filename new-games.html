
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<title>New Unblocked Games</title>

<meta name="description"
content="Discover the newest unblocked games on Tyrone Unblocked Games. Play new browser games instantly with no download required.">

<meta name="viewport" content="width=device-width, initial-scale=1">

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<h1>New Unblocked Games</h1>

<p>
Play the newest games added to Tyrone Unblocked Games.
</p>

</header>


<div id="game-grid" class="game-grid"></div>


<script>

fetch("https://tyroneunblockedgames.com/generate_json.php?type=new")

.then(res => res.json())

.then(data => {

const container = document.getElementById("game-grid")

data.forEach(game => {

const card = document.createElement("div")

card.className = "game-card"

card.innerHTML = `

<a href="${game.link}" target="_blank">

<img src="${game.thumb}" alt="${game.name}">

<h3>${game.name}</h3>

</a>

`

container.appendChild(card)

})

})

</script>


<footer>

<a href="index.html">Home</a> |

<a href="popular-games.html">Popular Games</a>

</footer>

</body>

</html>
